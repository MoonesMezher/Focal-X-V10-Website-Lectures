- Git: Distributed Version Control System (DVCS)
- Free & Open Source (Created by Linus Torvalds)
- Available as GUI or CLI (Command Line Recommended)

Why Git is Essential:
- Track all changes and history
- Collaborate efficiently with teams
- Revert to previous versions when needed
- Maintain multiple features simultaneously
- Backup and restore code easily

Without Git:
- No proper change tracking
- Team collaboration becomes chaotic
- Manual file sharing (email, USB, cloud)
- No reliable backup system
- Difficulty in identifying when bugs were introduced`
        }, {
            tabTitle: "Git vs GitHub",
            title: "GitHub & Alternatives",
            content: `Git Hosting Platforms

GitHub:
- Cloud-based Git repository hosting
- Web-based graphical interface
- Collaboration tools (issues, PRs, projects)
- Free for public repositories

Other Platforms:
- GitLab: Self-hosted alternative with CI/CD
- Bitbucket: Good for small teams, free private repos
- Azure DevOps: Microsoft's enterprise solution
- SourceForge: Older platform for open source

Key Differences:
- Git: The version control tool itself
- GitHub: A service that hosts Git repositories
- You can use Git without GitHub
- GitHub enhances Git with collaboration features`
        }, {
            tabTitle: "Core Concepts",
            title: "Git Core Concepts",
            content: `Fundamental Git Building Blocks

Repository (Repo):
- Container for your project and its history
- Can be local (your machine) or remote (server)

Branch:
- Independent line of development
- Enables parallel work without conflicts
- Default branch: main/master

Commit:
- Snapshot of changes with descriptive message
- Unique SHA-1 hash identifier
- Checkpoint in project history

Common Operations:
- Clone: Copy repository from remote
- Push: Upload local changes to remote
- Pull: Download remote changes to local
- Fork: Copy someone else's repository
- Pull Request: Request to merge changes

Best Practices:
- One repository per project
- One branch per feature/task
- Meaningful commit messages
- Regular pushing to remote`
        }, {

            content: `Getting Started with Git

Installation Steps:
1. Create GitHub account (github.com)
2. Install Git:
   - Windows: git-scm.com/downloads
   - macOS: brew.sh OR git-scm.com/downloads
   - Linux: sudo apt-get install git

Verification:
\`\`\`bash
git --version
git config --global --list
\`\`\`

Essential Configuration:
\`\`\`bash
git config --global user.name "Your Name"
git config --global user.email "your.email@example.com"
git config --global init.defaultBranch main
git config --global core.editor "code --wait"  # VS Code
\`\`\`

Common Configurations:
- core.autocrlf: Handle line endings (true for Windows)
- merge.tool: Configure merge tool
- alias: Create command shortcuts`
        }, {

Repository Operations:
\`\`\`bash
git init                    # Initialize new repo
git clone [url]            # Clone existing repo
git status                 # Check repository status
\`\`\`

Basic Workflow:
\`\`\`bash
git add [files]            # Stage changes
git add .                  # Stage all changes
git reset [files]          # Unstage changes
git commit -m "message"    # Commit staged changes
\`\`\`

History & Inspection:
\`\`\`bash
git log                    # Show commit history
git log --oneline          # Compact history
git show [commit]          # Show commit details
git diff                   # Show unstaged changes
\`\`\`

Remote Operations:
\`\`\`bash
git push origin main       # Push to remote
git pull origin main       # Pull from remote
git fetch                  # Download remote updates
git remote -v              # Show remote repositories
\`\`\` `
        }, {

Branch Operations:
\`\`\`bash
git branch                 # List branches
git branch [name]         # Create new branch
git checkout [branch]     # Switch branch
git checkout -b [branch]  # Create and switch
git merge [branch]        # Merge branches
git branch -d [branch]    # Delete branch
\`\`\`

Branch Strategies:
- Feature Branches: One branch per feature
- Release Branches: Prepare for releases
- Hotfix Branches: Emergency fixes
- Development Branch: Integration branch

Merging Types:
- Fast-forward: Linear history
- 3-way Merge: Creates merge commit
- Rebase: Linear history, rewrites commits

Best Practices:
- Create descriptive branch names
- Keep branches focused and small
- Regular merging with main
- Delete merged branches`
