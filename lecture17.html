NPM (Node Package Manager) - Your development toolbox

Why we need libraries?
• Write code faster & more efficient
• Solve common problems others have already solved
• Focus on business logic rather than reinventing wheels

Key Commands:
• npm init / npm init -y - Create package.json
• npm install <package> - Local installation
• npm install -g <package> - Global installation
• npm uninstall <package> - Remove package
• npm update <package> - Update package

Understanding package.json:
• dependencies - Production packages
• devDependencies - Development-only packages (nodemon, testing tools)
• scripts - Custom automation commands

What is node_modules?
• Contains all modules and their dependencies
• Can see library code (open source)
• Be careful about package size and dependencies

Security Best Practices:
• Check package popularity and maintenance
• Regular security audits: npm audit
• Use specific versions, not wildcards
*/

        content: `/*
Request Object Properties:
• req.params - Route parameters
• req.query - URL query parameters  
• req.body - Request body (needs middleware)
• req.headers - HTTP headers
• req.method - HTTP method
• req.url - Request URL
• req.ip - Client IP address

Response Object Methods:
• res.json() - Send JSON response
• res.send() - Send various types
• res.status() - Set status code
• res.redirect() - Redirect request
• res.render() - Render view template
• res.set() - Set headers
• res.cookie() - Set cookies

Data Access Cheatsheet:
| Data Type | Source                    | Example                          | Access Method            |
|-----------|---------------------------|----------------------------------|--------------------------|
| Params    | URL path segments         | GET /users/123 → 123             | req.params.id            |
| Query     | URL query string          | GET /search?name=John → John     | req.query.name           |
| Body      | Submitted data (POST/PUT) | { "name": "John" } → John       | req.body.name            |
| Headers   | HTTP headers              | Authorization: Bearer token      | req.headers.authorization|
*/

Middleware: Functions that have access to request, response, and next function

Types of Middleware:
1. Application-level middleware
2. Router-level middleware  
3. Error-handling middleware
4. Built-in middleware
5. Third-party middleware

Execution Order Matters!

Higher Order Functions (HOF) in Middleware:
• Functions that return other functions
• Used for configuration (like morgan("dev"))
• Enable reusable, configurable middleware
*/

// Custom middleware example
const loggerMiddleware = (req, res, next) => {
    console.log(\`[\${new Date().toISOString()}] \${req.method} \${req.url}\`);
    next(); // Continue to next middleware/route
};

// HOF Middleware example (configurable)
const createAuthMiddleware = (requiredRole = 'user') => {
    return (req, res, next) => {
        const token = req.headers.authorization;
        
        if (!token) {
            return res.status(401).json({ error: 'No token provided' });
        }
        
        // Validate token and role (simplified)
        const user = validateToken(token);
        if (!user || (requiredRole !== 'user' && user.role !== requiredRole)) {
            return res.status(403).json({ error: 'Insufficient permissions' });
        }
        
        req.user = user;
        next();
    };
};

// Apply middleware in correct order
app.use(express.json()); // Built-in - MUST come first for body parsing
app.use(express.urlencoded({ extended: true })); // URL-encoded data
app.use(loggerMiddleware); // Custom logging
app.use('/api/admin', createAuthMiddleware('admin')); // Route-specific with HOF
app.use('/api/protected', createAuthMiddleware()); // Route-specific

// Error handling middleware (must be last)
app.use((error, req, res, next) => {
    console.error('Error:', error);
    res.status(500).json({ 
        error: 'Something went wrong!',
        ...(process.env.NODE_ENV === 'development' && { stack: error.stack })
    });
});

// 404 handler (must be last middleware)
app.use('*', (req, res) => {
    res.status(404).json({ error: 'Route not found' });
});

// Popular third-party middleware:
// • cors - Enable CORS
// • helmet - Security headers  
// • morgan - HTTP request logger
// • compression - Response compression
// • cookie-parser - Parse cookies

// API Logging options:
// 1. Handmade logger (like above)
// 2. Morgan: npm install morgan
const morgan = require('morgan');
app.use(morgan('dev')); // Pre-configured logging formats`

// Example of OOP Controller with try-catch
class UserController {
    async getAllUsers(req, res) {
        try {
            // Business logic here
            const users = await UserModel.findAll();
            res.json({
                success: true,
                count: users.length,
                data: users
            });
        } catch (error) {
            console.error('Get users error:', error);
            res.status(500).json({
                success: false,
                error: 'Failed to fetch users'
            });
        }
    }

    async createUser(req, res) {
        try {
            const { name, email, age } = req.body;
            
            // Validation
            if (!name || !email) {
                return res.status(400).json({
                    success: false,
                    error: 'Name and email are required'
                });
            }

            const newUser = await UserModel.create({ name, email, age });
            
            res.status(201).json({
                success: true,
                message: 'User created successfully',
                data: newUser
            });
        } catch (error) {
            console.error('Create user error:', error);
            res.status(500).json({
                success: false,
                error: 'Failed to create user'
            });
        }
    }
}

const router = express.Router();
const userController = new UserController();

router.get('/', userController.getAllUsers.bind(userController));

module.exports = router;
