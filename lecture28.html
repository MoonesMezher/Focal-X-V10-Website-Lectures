// ===== ARGON2 HASHING IMPLEMENTATION =====
const argon2 = require('argon2');

class PasswordService {
    // Hash password with Argon2 (modern & secure)
    static async hashPassword(password) {
        try {
            return await argon2.hash(password, {
                type: argon2.argon2id,
                memoryCost: 2 ** 16, // 64MB
                timeCost: 3,
                parallelism: 1,
                hashLength: 32
            });
        } catch (error) {
            throw new Error('Password hashing failed');
        }
    }

    // Verify password against hash
    static async verifyPassword(hash, password) {
        try {
            return await argon2.verify(hash, password);
        } catch (error) {
            throw new Error('Password verification failed');
        }
    }
}

// Usage in auth controller
const registerUser = async (userData) => {
    const hashedPassword = await PasswordService.hashPassword(userData.password);
    
    return await User.create({
        ...userData,
        password: hashedPassword
    });
};

const loginUser = async (email, password) => {
    const user = await User.findOne({ email });
    if (!user) return false;

    const isValid = await PasswordService.verifyPassword(user.password, password);
    return isValid ? user : false;
};

// ===== XSS PROTECTION =====
const xss = require('xss');

// XSS sanitization function
const sanitizeInput = (input) => {
    if (typeof input === 'string') {
        return xss(input, {
            whiteList: {}, // empty means remove all tags
            stripIgnoreTag: true,
            stripIgnoreTagBody: ['script', 'style']
        }).trim();
    }
    return input;
};

// Middleware to sanitize all incoming data
const xssSanitize = (req, res, next) => {
    if (req.body) {
        Object.keys(req.body).forEach(key => {
            req.body[key] = sanitizeInput(req.body[key]);
        });
    }
    if (req.query) {
        Object.keys(req.query).forEach(key => {
            req.query[key] = sanitizeInput(req.query[key]);
        });
    }
    if (req.params) {
        Object.keys(req.params).forEach(key => {
            req.params[key] = sanitizeInput(req.params[key]);
        });
    }
    next();
};

app.use(xssSanitize);`

• Request validation with express-validator

// src/validation/userValidation.js
const { body, param, query, validationResult } = require('express-validator');
const User = require('../models/User');

// Custom validation functions
const isStrongPassword = (value) => {
    if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{8,}/.test(value)) {
        throw new Error('Password must contain uppercase, lowercase, number, special character, and be at least 8 characters long');
    }
    return true;
};

const isEmailAvailable = async (email) => {
    const user = await User.findOne({ email });
    if (user) {
        throw new Error('Email is already registered');
    }
    return true;
};

// User registration validation schema
const validateUserRegistration = [
    body('email')
        .isEmail().normalizeEmail()
        .withMessage('Please provide a valid email')
        .custom(isEmailAvailable),

    body('password')
        .isLength({ min: 8 }).withMessage('Password must be at least 8 characters')
        .custom(isStrongPassword),

    body('username')
        .optional() // Optional field
        .isAlphanumeric().withMessage('Username must be alphanumeric')
        .isLength({ min: 3, max: 30 }).withMessage('Username must be between 3-30 characters')
        .trim(),

    body('phone')
        .optional()
        .isMobilePhone().withMessage('Please provide a valid phone number'),

    body('role')
        .optional()
        .isIn(['user', 'admin', 'moderator']).withMessage('Invalid role specified')
];

// User update validation (different rules for updates)
const validateUserUpdate = [
    body('email')
        .optional()
        .isEmail().normalizeEmail()
        .withMessage('Please provide a valid email'),

    body('username')
        .optional()
        .isAlphanumeric().withMessage('Username must be alphanumeric')
        .isLength({ min: 3, max: 30 }).withMessage('Username must be between 3-30 characters')
        .trim(),

    body('profile.bio')
        .optional()
        .isLength({ max: 500 }).withMessage('Bio cannot exceed 500 characters')
        .escape() // HTML escape for safety
];

// ID parameter validation
const validateObjectId = [
    param('id')
        .isMongoId().withMessage('Invalid ID format')
        .escape()
];

// Search query validation
const validateSearchQuery = [
    query('q')
        .optional()
        .isLength({ min: 1, max: 50 }).withMessage('Search query must be between 1-50 characters')
        .trim().escape(),

    query('page')
        .optional()
        .isInt({ min: 1 }).withMessage('Page must be a positive integer')
        .toInt(),

    query('limit')
        .optional()
        .isInt({ min: 1, max: 100 }).withMessage('Limit must be between 1-100')
        .toInt()
];

// Validation middleware
const handleValidationErrors = (req, res, next) => {
    const errors = validationResult(req);
    if (!errors.isEmpty()) {
        return res.status(400).json({
            success: false,
            message: 'Validation failed',
            errors: errors.array().map(err => ({
                field: err.path,
                message: err.msg,
                value: err.value
            }))
        });
    }
    next();
};

// Usage in routes
router.post('/register', 
    validateUserRegistration, 
    handleValidationErrors,
    userController.register
);

router.put('/users/:id',
    validateObjectId,
    validateUserUpdate,
    handleValidationErrors, 
    userController.updateUser
);

router.get('/search',
    validateSearchQuery,
    handleValidationErrors,
    userController.searchUsers
);`

Production Best Practices:
• Environment configuration
• Security headers
• Rate limiting
• Request sanitization
• Proper error handling
• Logging
• Performance optimization
*/

const cors = require('cors');
const helmet = require('helmet');
const rateLimit = require('express-rate-limit');
const compression = require('compression');

// Security middleware
app.use(helmet({
    contentSecurityPolicy: {
        directives: {
            defaultSrc: ["'self'"],
            styleSrc: ["'self'", "'unsafe-inline'"],
            scriptSrc: ["'self'"],
            imgSrc: ["'self'", "data:", "https:"],
        },
    },
    crossOriginEmbedderPolicy: false
}));

// CORS configuration
app.use(cors({
    origin: process.env.ALLOWED_ORIGINS?.split(',') || ['http://localhost:3000'],
    credentials: true
}));

// Rate limiting
const limiter = rateLimit({
    windowMs: 15 * 60 * 1000, // 15 minutes
    max: 100, // limit each IP to 100 requests per windowMs
    message: {
        error: 'Too many requests from this IP, please try again later.'
    }
});
app.use('/api/', limiter);

// Compression
app.use(compression());

// Environment-based configuration
const config = {
    development: {
        port: 4000,
        host: 'localhost',
        logLevel: 'debug'
    },
    production: {
        port: process.env.PORT || 80,
        host: '0.0.0.0',
        logLevel: 'warn'
    }
};

const environment = process.env.NODE_ENV || 'development';
const currentConfig = config[environment];

// Advanced error handling
class AppError extends Error {
    constructor(message, statusCode) {
        super(message);
        this.statusCode = statusCode;
        this.isOperational = true;
        Error.captureStackTrace(this, this.constructor);
    }
}

// Async error wrapper (avoid try-catch in every route)
const asyncHandler = (fn) => (req, res, next) => {
    Promise.resolve(fn(req, res, next)).catch(next);
};

// Example with async handler
app.get('/api/async-users', asyncHandler(async (req, res) => {
    // Simulate async operation
    const users = await Promise.resolve([...users]);
    res.json({ success: true, data: users });
}));

// Global error handler
app.use((err, req, res, next) => {
    err.statusCode = err.statusCode || 500;
    err.status = err.status || 'error';

    if (process.env.NODE_ENV === 'development') {
        res.status(err.statusCode).json({
            status: err.status,
            error: err,
            message: err.message,
            stack: err.stack
        });
    } else {
        // Production: don't leak error details
        if (err.isOperational) {
            res.status(err.statusCode).json({
                status: err.status,
                message: err.message
            });
        } else {
            console.error('ERROR 💥', err);
            res.status(500).json({
                status: 'error',
                message: 'Something went wrong!'
            });
        }
    }
});

// Graceful shutdown
process.on('SIGTERM', () => {
    console.log('SIGTERM received. Shutting down gracefully...');
    server.close(() => {
        console.log('Process terminated');
    });
});`
