| Aspect               | SQL Databases              | NoSQL Databases            |
|----------------------|----------------------------|----------------------------|
| Data Structure       | Table-based (Rows/Columns) | Document/Key-Value/Graph   |
| Schema               | ✅ Strict, predefined      | ✅ Flexible, dynamic       |
| Scaling              | ✅ Vertical scaling        | ✅ Horizontal scaling      |
| Transactions         | ✅ ACID compliance         | ✅ BASE principle          |
| Joins                | ✅ Native JOIN operations  | ❌ Manual references       |
| Examples             | MySQL, PostgreSQL          | MongoDB, Cassandra         |

When to Use Each:

SQL (Structured Data):
• Financial systems (banks, accounting)
• E-commerce platforms
• Applications requiring complex joins
• Data with strict relationships

NoSQL (Flexible Data):
• Real-time applications (chat, gaming)
• Content management systems
• IoT data processing
• Rapid prototyping
• Scalable web applications

Modern Approach: Polyglot Persistence
• Use SQL for transactional data
• Use NoSQL for content, logs, analytics
• Use Redis for caching
• Use Elasticsearch for search
*/`

            // Connection options (Mongoose 6+)
            maxPoolSize: 10, // Maximum number of sockets in connection pool
            serverSelectionTimeoutMS: 5000, // Timeout for server selection
            socketTimeoutMS: 45000, // Socket timeout
            bufferCommands: false, // Disable mongoose buffering

/*
What is a Schema?
• Blueprint for documents in a collection
• Defines structure and data types
• Enforces validation rules
• Supports middleware and methods
*/

// Basic Schema Definition
const mongoose = require('mongoose');
const { Schema } = mongoose;

const userSchema = new Schema({
    // String type with validation
    name: { 
        type: String, 
        required: [true, 'Name is required'],
        trim: true,
        minlength: [2, 'Name must be at least 2 characters'],
        maxlength: [50, 'Name cannot exceed 50 characters'],
        index: true // Create database index
    },
    
    // Email with custom validation
    email: {
        type: String,
        required: [true, 'Email is required'],
        unique: true,
        lowercase: true,
        validate: {
            validator: function(email) {
                return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email);
            },
            message: 'Please provide a valid email address'
        }
    },
    
    // Number with range validation
    age: {
        type: Number,
        min: [18, 'Age must be at least 18'],
        max: [120, 'Age cannot exceed 120'],
        validate: {
            validator: Number.isInteger,
            message: 'Age must be an integer'
        }
    },
    
    // Enum with predefined values
    role: {
        type: String,
        enum: {
            values: ['user', 'admin', 'moderator'],
            message: 'Role must be either user, admin, or moderator'
        },
        default: 'user'
    },
    
    // Nested objects
    profile: {
        bio: {
            type: String,
            maxlength: 500
        },
        avatar: String,
        website: {
            type: String,
            validate: {
                validator: function(url) {
                    return url === '' || /^https?:\\/\\/.+\\..+/.test(url);
                },
                message: 'Please provide a valid URL'
            }
        }
    },
    
    // Arrays
    tags: [{
        type: String,
        lowercase: true
    }],
    
    // References to other collections
    department: {
        type: Schema.Types.ObjectId,
        ref: 'Department' // Reference to Department model
    },
    
    // GeoJSON for location data
    location: {
        type: {
            type: String,
            enum: ['Point'],
            default: 'Point'
        },
        coordinates: {
            type: [Number], // [longitude, latitude]
            index: '2dsphere'
        }
    },
    
    // Mixed type for flexible data
    metadata: Schema.Types.Mixed,
    
    // Boolean with default
    isActive: {
        type: Boolean,
        default: true
    }
    
}, {
    // Schema Options
    timestamps: true, // Adds createdAt and updatedAt automatically
    toJSON: { 
        virtuals: true,
        transform: function(doc, ret) {
            // Remove sensitive data when converting to JSON
            delete ret.password;
            delete ret.__v;
            return ret;
        }
    },
    toObject: { 
        virtuals: true,
        transform: function(doc, ret) {
            delete ret.password;
            delete ret.__v;
            return ret;
        }
    },
    id: false // Disable the default _id to id conversion
});

// ## Virtual Properties

// Virtual properties (not stored in database)
userSchema.virtual('displayName').get(function() {
    return \`\${this.name} (\${this.email})\`;
});

userSchema.virtual('profileUrl').get(function() {
    return \`/users/\${this._id}/profile\`;
});

// ## Instance Methods

// Methods available on document instances
userSchema.methods.getProfileInfo = function() {
    return \`Name: \${this.name}, Email: \${this.email}, Role: \${this.role}\`;
};

userSchema.methods.isAdmin = function() {
    return this.role === 'admin';
};

userSchema.methods.updateLastActive = function() {
    this.lastActive = new Date();
    return this.save();
};

// ## Static Methods

// Methods available on the model
userSchema.statics.findByEmail = function(email) {
    return this.findOne({ email: email.toLowerCase() });
};

userSchema.statics.findAdmins = function() {
    return this.find({ role: 'admin' });
};

userSchema.statics.findByRole = function(role) {
    return this.find({ role: role.toLowerCase() });
};

// ## Query Helpers

// Chainable query methods
userSchema.query.byName = function(name) {
    return this.where({ name: new RegExp(name, 'i') });
};

userSchema.query.active = function() {
    return this.where({ isActive: true });
};

// ## Indexes

// Compound indexes for better query performance
userSchema.index({ email: 1 }); // Single field index
userSchema.index({ name: 1, role: 1 }); // Compound index
userSchema.index({ 'location.coordinates': '2dsphere' }); // Geospatial index

// ## Middleware (Hooks)

// Pre-save middleware
userSchema.pre('save', function(next) {
    console.log(\`Saving user: \${this.name}\`);
    
    // Example: Hash password before saving
    if (this.isModified('password')) {
        // this.password = hashPassword(this.password);
    }
    
    next();
});

userSchema.pre('save', function(next) {
    // Set default values or transform data
    if (this.isNew) {
        this.createdAt = new Date();
    }
    next();
});

// Post-save middleware
userSchema.post('save', function(doc, next) {
    console.log(\`User \${doc.name} saved successfully\`);
    // Example: Send welcome email

});

// Query middleware
userSchema.pre(/^find/, function(next) {
    // Automatically populate department for all find queries

    next();
});

// ## Validation

// Custom async validation
userSchema.path('email').validate(async function(email) {
    if (!this.isModified('email')) return true;
    
    const User = mongoose.model('User');
    const existingUser = await User.findOne({ email });
    return !existingUser;
}, 'Email already exists');

const User = mongoose.model('User', userSchema);

// ## Aggregation Operations

const userAnalytics = async () => {
    try {
        const analytics = await User.aggregate([
            // Stage 1: Match active users
            {
                $match: {
                    isActive: true
                }
            },
            
            // Stage 2: Group by role and calculate statistics
            {
                $group: {
                    _id: '$role',
                    count: { $sum: 1 },
                    averageAge: { $avg: '$age' },
                    minAge: { $min: '$age' },
                    maxAge: { $max: '$age' },
                    users: { $push: '$name' }
                }
            },
            
            // Stage 3: Sort by count descending
            {
                $sort: { count: -1 }
            },
            
            // Stage 4: Project final format
            {
                $project: {
                    role: '$_id',
                    _id: 0,
                    count: 1,
                    averageAge: { $round: ['$averageAge', 1] },
                    ageRange: {
                        min: '$minAge',
                        max: '$maxAge'
                    },
                    sampleUsers: { $slice: ['$users', 3] } // First 3 users
                }
            }
        ]);
        
        return analytics;
    } catch (error) {
        console.error('Error in aggregation:', error);
        throw error;
    }
};

// Pagination
const getUsersPaginated = async (page = 1, limit = 10) => {
    try {
        const skip = (page - 1) * limit;
        
        const [users, total] = await Promise.all([
            User.find()
                .skip(skip)
                .limit(limit)
                .sort({ createdAt: -1 }),
            User.countDocuments()
        ]);
        
        return {
            users,
            pagination: {
                page,
                limit,
                total,
                pages: Math.ceil(total / limit)
            }
        };
    } catch (error) {
        console.error('Error in pagination:', error);
        throw error;
    }
};
