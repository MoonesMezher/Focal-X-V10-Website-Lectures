            tabTitle: "Introduction to Express.js",
            title: "Why Express.js?",
            content: `/*
Express.js is a minimal and flexible Node.js web application framework that provides a robust set of features for web and mobile applications.

Why Express.js over HTTP module?
• Faster development
• Built-in middleware support
• Robust routing
• Better error handling
• Large ecosystem of packages
• Community support

Think of it like this:
• HTTP module = Building a car from scratch
• Express.js = Using a car manufacturing framework

Popular Express-based frameworks:
• Nest.js - Enterprise-grade
• Next.js - React-based SSR
• Fastify - Performance focused
*/

// Basic comparison: HTTP vs Express
const http = require('http');
const express = require('express');

// HTTP module approach
const httpServer = http.createServer((req, res) => {
    if (req.url === '/api/users' && req.method === 'GET') {
        res.writeHead(200, {'Content-Type': 'application/json'});
        res.end(JSON.stringify({users: []}));
    }
});

// Express approach
const app = express();
app.get('/api/users', (req, res) => {
    res.json({users: []});
});`
        }, {
            tabTitle: "Express Server Setup",
            title: "Creating Your First Express Server",
            content: `/*
Basic Express Server Structure:
1. Import Express
2. Create app instance
3. Configure middleware
4. Define routes
5. Start server
*/

const express = require('express');
const app = express();

// Middleware configuration
app.use(express.json()); // Parse JSON bodies
app.use(express.urlencoded({ extended: true })); // Parse URL-encoded bodies

// Basic route
app.get('/', (req, res) => {
    res.send('Hello World!');
});

// Health check endpoint
app.get('/health', (req, res) => {
    res.status(200).json({ 
        status: 'OK', 
        timestamp: new Date().toISOString(),
        uptime: process.uptime()
    });
});

// Server configuration
const PORT = process.env.PORT || 4000;
const HOST = process.env.HOST || 'localhost';

app.listen(PORT, HOST, () => {
    console.log(\`Server running at http://\${HOST}:\${PORT}\`);
});

/*
Environment Variables (.env file):
PORT=4000
HOST=localhost
NODE_ENV=development

Access with: process.env.PORT
*/`
        }, {
            tabTitle: "Routing & HTTP Methods",
            title: "Complete Routing Guide",
            content: `/*
Express Routing Methods:
• GET    - Retrieve data
• POST   - Create data
• PUT    - Update entire resource
• PATCH  - Partial update
• DELETE - Remove data
• ALL    - Handle all methods

Route Parameters:
• :id - Dynamic segments
• Query strings - ?key=value
• Request body - JSON/form data
*/

// Route parameters
app.get('/users/:userId/posts/:postId', (req, res) => {
    const { userId, postId } = req.params;
    res.json({ userId, postId });
});

// Query parameters
app.get('/search', (req, res) => {
    const { q, page, limit } = req.query;
    res.json({ query: q, page: page || 1, limit: limit || 10 });
});

// All HTTP methods demonstration
app.route('/api/products')
    .get((req, res) => {
        // Get all products
        res.json({ message: 'GET all products' });
    })
    .post((req, res) => {
        // Create new product
        const product = req.body;
        res.status(201).json({ message: 'Product created', product });
    })
    .put((req, res) => {
        // Update all products (rare)
        res.json({ message: 'All products updated' });
    });

app.route('/api/products/:id')
    .get((req, res) => {
        const { id } = req.params;
        res.json({ message: \`GET product \${id}\` });
    })
    .put((req, res) => {
        const { id } = req.params;
        const updates = req.body;
        res.json({ message: \`PUT product \${id}\`, updates });
    })
    .patch((req, res) => {
        const { id } = req.params;
        const partialUpdates = req.body;
        res.json({ message: \`PATCH product \${id}\`, partialUpdates });
    })
    .delete((req, res) => {
        const { id } = req.params;
        res.json({ message: \`DELETE product \${id}\` });
    });`
        }, {
            tabTitle: "Request & Response Objects",
            title: "Mastering Request & Response",
            content: `/*
Request Object Properties:
• req.params - Route parameters
• req.query - URL query parameters
• req.body - Request body (needs middleware)
• req.headers - HTTP headers
• req.method - HTTP method
• req.url - Request URL
• req.ip - Client IP address

Response Object Methods:
• res.json() - Send JSON response
• res.send() - Send various types
• res.status() - Set status code
• res.redirect() - Redirect request
• res.render() - Render view template
• res.set() - Set headers
• res.cookie() - Set cookies
*/

// Request object deep dive
app.post('/api/users', (req, res) => {
    console.log('Request Method:', req.method);
    console.log('Request URL:', req.url);
    console.log('Request Headers:', req.headers);
    console.log('Request IP:', req.ip);
    
    // Body parsing (requires express.json() middleware)
    const { name, email, age } = req.body;
    
    // Query parameters
    const { debug, version } = req.query;
    
    // Response examples
    if (debug === 'true') {
        res.status(200).json({
            success: true,
            data: { name, email, age },
            debug: { 
                headers: req.headers,
                ip: req.ip,
                timestamp: new Date().toISOString()
            }
        });
    } else {
        res.status(201).json({
            success: true,
            message: 'User created successfully',
            data: { name, email, age }
        });
    }
});

// Response methods examples
app.get('/redirect-example', (req, res) => {
    res.redirect('/new-location');
});

app.get('/set-headers', (req, res) => {
    res.set({
        'Content-Type': 'application/json',
        'X-Custom-Header': 'MyValue',
        'Cache-Control': 'no-cache'
    });
    res.json({ message: 'Custom headers set' });
});

app.get('/download', (req, res) => {
    res.download('./file.pdf'); // Force file download
});

app.get('/jsonp', (req, res) => {
    res.jsonp({ message: 'JSONP response' }); // JSON with padding
});`
