// 1
function normalizePost(post) {
    return { 
        id: post.id, 
        author: post.author.trim().toLowerCase(), 
        content: post.content.trim().toLowerCase(), 
        likes: +post.likes, 
        shares: +post.shares,

function isPostValid(post) { 
    if(!post.content || post.content.trim() === "") {
        return { status: false, reason: "Invalid \`content\` value" } 
    } else if(typeof(post.likes) !== "number" || post.likes < 0) {

        return { status: false, reason: "Invalid \`comments\` value" } 
    }

    return { status: true, reason: "" } // { status, reason } 
}

// 3
function calculateEngagementScore(post) {
    // shares (3) > comments (2) > likes (1)
    // shares * 3 + comments * 2 + likes

    return (
        ((+post.likes || 0) * 1) 
        + ((+post.comments || 0) * 2)

}

// 4
function mutateFeed(posts) {
    // mutating methods
    posts.sort((a, b) => +b.likes - +a.likes);

    return posts;
}

function cloneAndTransformFeed(posts) {
    // non-mutating methods
    const newPosts = posts.slice();
    newPosts.sort((a, b) => +b.likes - +a.likes)

    return newPosts;
}

// 5
function rankPosts(posts) {
    // score -> id
    const newPosts = posts.slice();

    newPosts.sort((a, b) => {
        if(a.score !== b.score) {
            return b.score - a.score
        }
        return a.id.localeCompare(b.id)
    })

    return newPosts;
}

function extractTopHashtags(posts, limit = 10) {
    // posts
    const newPosts = posts.map(post => {
        return post.content.split(" ").filter(e => e.startsWith("#"))
    });
    
    const output = []; // { title: "#", count: 0 }

    newPosts.forEach(post => {
        post.forEach(pp => {
            const targetHashtag = output.find(e => e.title === pp);
            if(targetHashtag) {
                targetHashtag.count += 1;
            } else {
                output.push({ title: pp, count: 1 })
            }
        })
    });

    output.sort((a, b) => b.count - a.count)

    return output.slice(0, limit);
    // slice(0, limit)
}

function deletePost(posts, postId) {

function getTopPosts(posts, limit) {

    posts.sort((a, b) => b.score - a.score);

}
function getStats(posts) {
    //  your code
    const totalScore = posts.reduce((a, b) => a + b.score, 0);

    return {

    }
}
