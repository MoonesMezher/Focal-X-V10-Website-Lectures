## Part 1 — How system design starts (real life)

In most real projects, nobody hands you a finished database on day one.

• Product or the client describes **what the system must do** (requirements, user stories, screens).
• You, as a backend developer, **translate that into data**: what to store, how pieces connect, and which fields exist only to support rules or workflows.

That translation is **database / data modeling** (for MongoDB: collections, documents, references between documents).

### A practical way to begin

1. **List actors** — Who uses the system? (customer, restaurant owner, driver, admin.)
2. **List main actions** — What do they do? (browse menu, place order, update delivery status.)
3. **Find the nouns** — Each important noun often becomes a **collection** (User, Restaurant, Category, Dish, Order…).
4. **Draw relationships** — One restaurant has many categories; one category has many dishes; one customer places many orders.
5. **Name fields by role** — Not every field is “business data.” Some fields exist only to **link** documents; others exist to **solve a problem** (availability, sorting, security).

Only after this do you implement schemas in Mongoose (or another layer). The design document comes first; code follows.

---

## Part 2 — Three kinds of fields (think before you code)

When you design a collection, classify each field:

| Kind | Purpose | Examples |
|------|---------|----------|
| **Data fields** | Store real-world facts shown to users or used in logic | name, price, address, phone, description |
| **Relationship fields** | Point to another document (foreign key / reference) | restaurantId on a Category, categoryId on a Dish |
| **Problem-solving fields** | Support rules, performance, security, or UX — not always visible on screen | hashed password, accountType, isAvailable, sortOrder, averageRating, createdAt |

If you mix these mentally, you avoid giant nested blobs (e.g. embedding every dish inside a restaurant) and you avoid missing fields the app needs later (e.g. driver location for dispatch).

---

## Part 3 — Example system: food ordering app

Below is a **sample** document-database design for a food-ordering platform. Collection names are in English; field lists are descriptive only (no code).

### Collection: Users

**Purpose:** Everyone who signs in — customers, restaurant accounts, drivers.

**Data fields:** unique id, full name, phone, email, createdAt.

**Problem-solving fields:** password (stored hashed only), accountType (customer | restaurant | driver).

**Type-specific data / problem-solving:**
• Customer — default delivery address (used at checkout).
• Driver — current location (longitude, latitude), availability status (available | busy).
• Restaurant account — link to the Restaurants collection via id (relationship); restaurant-specific profile lives in Restaurants, not duplicated inside User.

---

### Collection: Restaurants

**Purpose:** One document per restaurant brand/location.

**Data fields:** unique id, name, short description, cover image URL, text address, geo coordinates, opening hours (structured text or object for days/times), registeredAt.

**Problem-solving fields:** averageRating (decimal, updated when reviews exist — avoids recalculating on every browse).

**Design note:** Categories and dishes are **not** embedded here. They live in their own collections and link back with **relationship fields** (easier updates, clearer ownership).

---

### Collection: Categories

**Purpose:** Menu sections per restaurant (e.g. Pizza, Drinks).

**Data fields:** unique id, name, short description.

**Relationship fields:** restaurantId (each category belongs to exactly one restaurant).

**Problem-solving fields:** displayOrder (controls sort order on the menu screen).

**Relationship rule:** One restaurant → many categories.

---

### Collection: Dishes

**Purpose:** Items customers add to a cart.

**Data fields:** unique id, name, short description, price, image URL.

**Relationship fields:** categoryId (each dish belongs to one category).

**Problem-solving fields:** prepTimeMinutes (kitchen / ETA logic), isAvailable (hide sold-out items without deleting), updatedAt.

**Relationship rule:** One category → many dishes.

---

### Example relationship map (this project only)

Users (restaurant) ──references──> Restaurants
Restaurants ──one-to-many──> Categories (via restaurantId)
Categories ──one-to-many──> Dishes (via categoryId)

Later you would add Orders, OrderItems, payments, etc. using the same process: requirements first, then collections, then data / relationship / problem-solving fields.

---

## Part 4 — What you implement after the design

1. Create Mongoose schemas that match the field types above (validation, enums, refs).
2. Use references + populate (or separate queries) instead of duplicating large trees.
3. Add indexes on relationship fields you query often (restaurantId, categoryId).
4. Keep revisiting the design when requirements change — that is normal in real products.

**Takeaway:** The database is part of system design. You are expected to design it from requirements, not wait for a ready-made schema.`
