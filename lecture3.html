console.log(greet("Moones")); // Works (hoisting)
function greet(name) {
    return "Hello, " + name + "!";
}

// Function Expression (not hoisted)
// console.log(greetExpr("Moones")); // Error (not hoisted)
const greetExpr = function(name) {
    return "Hello, " + name + "!";
};
console.log(greetExpr("Moones")); // Works

// Arrow Function (not hoisted, lexical this)
// console.log(greetArrow("Moones")); // Error (not hoisted)
const greetArrow = (name) => {
    return "Hello, " + name + "!";
};
console.log(greetArrow("Moones")); // Works

// Arrow function with implicit return
const add = (a, b) => a + b;
console.log(add(5, 3)); // 8

// Callback function example
function processUserInput(callback) {
    const name = "Moones";
    callback(name);
}

processUserInput(function(name) {
    console.log("Hello, " + name);
});

// IIFE (Immediately Invoked Function Expression)
(function() {
    console.log("This runs immediately!");
})();

function multiplyBy(factor) {
    return function(number) {
        return number * factor;
    };
}

const double = multiplyBy(2);
console.log(double(5)); // 10

// Recursive function
function factorial(n) {
    if (n === 0) return 1;
    return n * factorial(n - 1);
}

console.log(factorial(5)); // 120`
