// => A communication protocol that enables persistent, bidirectional communication between clients (browsers) 
// and servers over a single TCP connection. Unlike HTTP's request-response model.

// WebSockets allow:
//     - Real-time data transfer
//     - Low-latency communication
//     - Server-initiated message pushing

// Key Features:
//     - Full-duplex communication (both send/receive simultaneously)
//     - Lightweight header (2-10 bytes vs HTTP's 800+ bytes)
//     - Designed for real-time applications

// ################## Socket.io ##########################

// => A JavaScript library that builds on WebSockets with additional features:
//     - Automatic fallback to HTTP long-polling if WebSockets unavailable
//     - Automatic reconnection
//     - Room-based messaging
//     - Built-in acknowledgements
//     - Broadcasting capabilities

// ################## Why use Socket.IO over raw WebSockets? ##########################

//     Raw WebSockets	      |       Socket.IO
// ----------------------------------------------------------
// No built-in reconnection   | Automatic reconnection
// ----------------------------------------------------------
// No fallback mechanisms     | Degrades to HTTP long-polling
// ----------------------------------------------------------
// Manual room implementation | Built-in room management
// ----------------------------------------------------------
// Basic error handling       | Advanced error recovery

// ################## HTTP vs Socket.IO: Key Differences ##########################

//              |       Feature	HTTP	              |         Socket.IO
// ------------------------------------------------------------------------------------
// Connection	|    Short-lived (per request)	      |  Persistent (stays open)
// Direction	|    Client → Server only (request)	  |  Bidirectional (client ↔ server)
// Latency	    |    High (new TCP handshake per req) |	 Low (no repeated handshakes)
// Server Push	|    Requires polling/SSE	          |  Native capability
// Overhead	    |    High (headers per request)	      |  Minimal after initial handshake
// Use Cases	|    Static content, forms, APIs	  |  Chat, gaming, live dashboards

// Key Takeaway:
// "HTTP is for getting data when you ask, Socket.IO is for streaming data as it happens."`
