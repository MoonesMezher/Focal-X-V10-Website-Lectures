            tabTitle: "Dev vs Production",
            title: "Why deployment matters",
            content: `/*
Development vs Production:

• On your laptop: nodemon, .env on disk, local MongoDB, debug logs everywhere.
• In production: stable process, secrets from the host, managed database, health checks, HTTPS, and users you do not control.

Goals of this lecture (deployment only):
• Ship your Node/Express API so others can reach it on the internet.
• Connect to MongoDB Atlas (cloud database).
• Configure environment variables safely on the platform.
• Run a production-ready server process (not "works on my machine").

This lecture does NOT cover Docker — that is Lecture 30.
*/`
        }, {
            tabTitle: "Render Deployment",
            title: "Deploying on Render",
            content: `/*
Render.com — common free/cheap host for Node APIs

Steps:
1. Push code to GitHub (public or private repo).
2. Create a new Web Service on Render → connect the repo.
3. Set build command (often empty or npm install) and start command: npm start
4. Add environment variables in the Render dashboard (never commit secrets).
5. Deploy — Render assigns a URL and sets PORT automatically.

package.json (production):
*/
{
  "name": "nodejs-api",
  "version": "1.0.0",
  "scripts": {
    "start": "node app.js",
    "dev": "nodemon app.js"
  },
  "engines": {
    "node": "18.x"
  }
}

/*
Environment variables on Render (examples):
• NODE_ENV=production
• PORT — set by Render (use process.env.PORT)
• MONGODB_URI=mongodb+srv://user:pass@cluster.mongodb.net/dbname
• JWT_SECRET=long-random-string
• Any keys your app reads via process.env

Bind the server to 0.0.0.0 so the platform can route traffic:
*/
const PORT = process.env.PORT || 4000;
app.listen(PORT, '0.0.0.0', () => {
    console.log(\`Server running on port \${PORT}\`);
});

/*
Health check route (Render can ping this):
*/
app.get('/health', (req, res) => {
    res.status(200).json({
        status: 'OK',
        timestamp: new Date().toISOString(),
        uptime: process.uptime()
    });
});`
        }, {
            tabTitle: "MongoDB Atlas",
            title: "Production database on Atlas",
            content: `/*
MongoDB Atlas — hosted MongoDB for production

Setup outline:
1. Create cluster (free tier M0 is enough to learn).
2. Database Access → create user + password.
3. Network Access → allow IP (0.0.0.0/0 for learning; restrict in real prod).
4. Connect → copy connection string → MONGODB_URI in Render env.

Connection in app:
*/
const mongoose = require('mongoose');

const connectDB = async () => {
    try {
        const conn = await mongoose.connect(process.env.MONGODB_URI);
        console.log(\`MongoDB Atlas connected: \${conn.connection.host}\`);
    } catch (error) {
        console.error('Database connection failed:', error);
        process.exit(1);
    }
};

/*
Tips:
• Use different databases or clusters for dev vs production when possible.
• Never commit MONGODB_URI with real credentials to Git.
• Handle disconnect / SIGTERM for graceful shutdown on redeploy.
*/`
        }, {

            title: "Before you go live",
            content: `/*
Pre-deploy checklist:

✓ .env.example committed; real .env in .gitignore
✓ start script runs node (not nodemon) in production
✓ process.env.PORT used (platform assigns port)
✓ listen on 0.0.0.0
✓ MONGODB_URI points to Atlas
✓ JWT_SECRET and other secrets only in host env vars
✓ /health endpoint returns 200
✓ CORS configured for your real frontend origin (if any)
✓ Error handler does not leak stack traces to clients in production

After deploy:
• Test API with Postman against the live URL
• Check Render logs for startup errors
• Confirm Atlas shows active connections

Alternatives to Render (research): Railway, Fly.io, Heroku, VPS — same ideas: env vars, start command, database URL.
*/`
