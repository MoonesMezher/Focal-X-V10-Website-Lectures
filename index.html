        // Function to generate lecture rows
        function generateLectureRows(lecturesArray) {
            const tableBody = document.getElementById('lectures-table-body');
            tableBody.innerHTML = ''; // Clear existing rows

            for (let lecture of lecturesArray) {
                const row = document.createElement('tr');

                // Set click event for the entire row
                row.onclick = () => {
                    if (lecture.link && lecture.link !== '#') {
                        window.location.href = lecture.link;
                    }
                };

                // Create table cells
                const numberCell = document.createElement('td');
                numberCell.textContent = lecture.number;

                const titleCell = document.createElement('td');
                const titleLink = document.createElement('a');
                titleLink.href = lecture.link;
                titleLink.className = 'lecture-link';
                titleLink.textContent = lecture.title;
                titleCell.appendChild(titleLink);

                const topicsCell = document.createElement('td');
                topicsCell.textContent = lecture.topics;

                const statusCell = document.createElement('td');
                const statusBadge = document.createElement('span');
                statusBadge.className = `status-badge status-${lecture.status}`;
                statusBadge.textContent = lecture.status.charAt(0).toUpperCase() + lecture.status.slice(1);
                statusCell.appendChild(statusBadge);

                // Append cells to row
                row.appendChild(numberCell);
                row.appendChild(titleCell);
                row.appendChild(topicsCell);
                row.appendChild(statusCell);

                // Append row to table body
                tableBody.appendChild(row);
            }
        }

        // Initial generation of lecture rows
        generateLectureRows(lectures);

        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', function() {
            const searchText = this.value.toLowerCase();
            const filteredLectures = lectures.filter(lecture => {
                return lecture.title.toLowerCase().includes(searchText) ||
                    lecture.topics.toLowerCase().includes(searchText) ||
                    lecture.number.toLowerCase().includes(searchText);
            });

            generateLectureRows(filteredLectures);
        });

        // Bonus: Function to add a new lecture (for easy updates)
        function addNewLecture(newLecture) {
            lectures.push(newLecture);
            generateLectureRows(lectures);
        }

        // Bonus: Function to update a lecture by number
        function updateLecture(lectureNumber, updatedData) {
            const index = lectures.findIndex(lecture => lecture.number === lectureNumber);
            if (index !== -1) {
                lectures[index] = {...lectures[index],
                    ...updatedData
                };
                generateLectureRows(lectures);
            }
        }

        // Bonus: Function to remove a lecture by number
        function removeLecture(lectureNumber) {
            const index = lectures.findIndex(lecture => lecture.number === lectureNumber);
            if (index !== -1) {
                lectures.splice(index, 1);
                generateLectureRows(lectures);
            }
        }
