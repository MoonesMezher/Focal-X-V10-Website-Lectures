What is README.md?
- Primary documentation file for projects
- First thing users see in your repository

- Project overview and purpose
- Installation instructions
- Usage examples
- Contribution guidelines
- License information

Purpose:
- Exclude files from version control
- Prevent committing sensitive data
- Avoid unnecessary binary files
- Keep repository clean and focused

Common Ignored Files:
\`\`\`
# Dependencies
node_modules/
vendor/
*.jar

# Environment variables
.env
.config

# OS files
.DS_Store
Thumbs.db

# IDE files
.vscode/
.idea/
*.swp

# Build outputs
/dist
/build
*.exe
\`\`\`

Usage:
- Create .gitignore in root directory
- One pattern per line
- Supports wildcards (*) and directories (/)
- Can have global .gitignore for all projects

Best Practices:
- Ignore OS-specific files
- Exclude dependencies
- Never commit secrets
- Use templates from gitignore.io`

Four Main Areas:

1. Working Directory
- Your actual project files
- Where you make changes
- Untracked by Git initially

2. Staging Area (Index)
- Prepares changes for commit
- Selective inclusion of changes
- Intermediate between working directory and repository

3. Local Repository
- Complete project history
- All commits and branches
- Stores metadata in .git folder

4. Remote Repository
- Shared repository (GitHub, etc.)
- Collaboration point for teams
- Backup and distribution center

Typical Workflow:
1. Modify files in Working Directory
2. Stage changes with git add
3. Commit changes with git commit
4. Push changes with git push`

Stashing Changes:
\`\`\`bash
git stash                  # Temporarily save changes
git stash list            # List stashes
git stash pop             # Restore latest stash
git stash apply           # Apply without removing
\`\`\`

Undoing Changes:
\`\`\`bash
git reset --soft [commit]  # Keep changes staged
git reset --mixed [commit] # Keep changes unstaged
git reset --hard [commit]  # Discard all changes
git revert [commit]        # Create undo commit
\`\`\`

Rebasing:
\`\`\`bash
git rebase main           # Reapply commits on main
git rebase -i [commit]    # Interactive rebase
\`\`\`

Tagging:
\`\`\`bash
git tag v1.0.0           # Create lightweight tag
git tag -a v1.0.0 -m "Release"  # Annotated tag
git push --tags          # Push tags to remote
\`\`\`

Advanced Tools:
- git bisect: Binary search for bugs
- git cherry-pick: Apply specific commits
- git reflog: Recovery tool
- git worktree: Multiple working directories`
