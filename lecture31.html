// ===== NODEMAILER CONFIGURATION =====
// src/services/emailService.js
const nodemailer = require('nodemailer');

class EmailService {
    constructor() {
        // Using Gmail with App Password (free)
        this.transporter = nodemailer.createTransport({
            service: 'gmail',
            auth: {
                user: process.env.EMAIL_USER,
                pass: process.env.EMAIL_APP_PASSWORD // App password, not regular password
            },
            // For other services like SendGrid, Mailgun, etc.
            /*
            host: process.env.SMTP_HOST,
            port: process.env.SMTP_PORT,
            secure: false,
            auth: {
                user: process.env.SMTP_USER,
                pass: process.env.SMTP_PASS
            }
            */
        });
    }

    // Send verification email
    async sendVerificationEmail(user, verificationToken) {
        const verificationUrl = \`\${process.env.APP_URL}/verify-email?token=\${verificationToken}\`;

        const mailOptions = {
            from: \`"Your App" <\${process.env.EMAIL_USER}>\`,
            to: user.email,
            subject: 'Verify Your Email Address',
            html: this.getVerificationTemplate(user.name, verificationUrl)
        };

        return await this.sendEmail(mailOptions);
    }

    // Send password reset email
    async sendPasswordResetEmail(user, resetToken) {
        const resetUrl = \`\${process.env.APP_URL}/reset-password?token=\${resetToken}\`;

        const mailOptions = {
            from: \`"Your App" <\${process.env.EMAIL_USER}>\`,
            to: user.email,
            subject: 'Reset Your Password',
            html: this.getPasswordResetTemplate(user.name, resetUrl)
        };

        return await this.sendEmail(mailOptions);
    }

    // Generic email sending method
    async sendEmail(mailOptions) {
        try {
            const info = await this.transporter.sendMail(mailOptions);
            console.log('Email sent: %s', info.messageId);
            return { success: true, messageId: info.messageId };
        } catch (error) {
            console.error('Email sending failed:', error);
            throw new Error('Failed to send email');
        }
    }

    // Email templates
    getVerificationTemplate(name, url) {
        return \`
        <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
            <h2 style="color: #333;">Welcome to Our App!</h2>
            <p>Hello \${name},</p>
            <p>Please verify your email address by clicking the button below:</p>
            <a href="\${url}"

            <h2 style="color: #333;">Password Reset Request</h2>
            <p>Hello \${name},</p>

            <p>This link will expire in 1 hour.</p>
            <p>If you didn't request this, please ignore this email.</p>

// ===== MONGODB ATLAS CONFIGURATION =====
// src/config/database.js
const mongoose = require('mongoose');

const connectDB = async () => {
    try {
        const conn = await mongoose.connect(process.env.MONGODB_URI, {
            // MongoDB Atlas connection options
            useNewUrlParser: true,
            useUnifiedTopology: true,
            // Remove deprecated options
        });

        console.log(\`MongoDB Atlas Connected: \${conn.connection.host}\`);
        
        // Connection event handlers
        mongoose.connection.on('error', (err) => {
            console.error('MongoDB connection error:', err);
        });

        mongoose.connection.on('disconnected', () => {
            console.log('MongoDB disconnected');
        });

        // Graceful shutdown
        process.on('SIGINT', async () => {
            await mongoose.connection.close();
            process.exit(0);
        });

    } catch (error) {
        console.error('Database connection failed:', error);
        process.exit(1);
    }
};

module.exports = connectDB;

Production Best Practices:
• Environment configuration
• Security headers
• Rate limiting
• Request sanitization
• Proper error handling
• Logging
• Performance optimization
*/

const cors = require('cors');
const helmet = require('helmet');
const rateLimit = require('express-rate-limit');
const compression = require('compression');

// Security middleware
app.use(helmet({
    contentSecurityPolicy: {
        directives: {
            defaultSrc: ["'self'"],
            styleSrc: ["'self'", "'unsafe-inline'"],
            scriptSrc: ["'self'"],
            imgSrc: ["'self'", "data:", "https:"],
        },
    },
    crossOriginEmbedderPolicy: false
}));

// CORS configuration
app.use(cors({
    origin: process.env.ALLOWED_ORIGINS?.split(',') || ['http://localhost:3000'],
    credentials: true
}));

// Rate limiting
const limiter = rateLimit({
    windowMs: 15 * 60 * 1000, // 15 minutes
    max: 100, // limit each IP to 100 requests per windowMs
    message: {
        error: 'Too many requests from this IP, please try again later.'
    }
});
app.use('/api/', limiter);

// Compression

class AppError extends Error {
    constructor(message, statusCode) {

        this.statusCode = statusCode;

}

// Async error wrapper (avoid try-catch in every route)

};

// Global error handler
app.use((err, req, res, next) => {
    err.statusCode = err.statusCode || 500;
    err.status = err.status || 'error';

    if (process.env.NODE_ENV === 'development') {
        res.status(err.statusCode).json({
            status: err.status,
            error: err,
            message: err.message,
            stack: err.stack
        });
    } else {
        // Production: don't leak error details
        if (err.isOperational) {
            res.status(err.statusCode).json({
                status: err.status,

            });
        } else {

            res.status(500).json({
                status: 'error',
                message: 'Something went wrong!'
            });
        }
    }
});

// Graceful shutdown
process.on('SIGTERM', () => {
