// Developers face environment inconsistencies:
// - Different operating systems
// - Different software versions
// - Different dependencies
// - Different configurations

// What is Docker?
// Docker is a platform for developing, shipping, and running applications
// in containers.

// Key Benefits of Docker:
// 1. Consistency Across Environments
//    - Same environment on dev, test, production
//    - No more "works on my machine" problems

// 2. Isolation
//    - Each app runs in its own container
//    - No conflicts between dependencies
//    - Secure isolation

// 3. Portability
//    - Build once, run anywhere
//    - Run on Linux, Windows, Mac, Cloud

// 4. Efficiency
//    - Containers are lightweight
//    - Fast startup times (seconds vs minutes for VMs)
//    - Low overhead

// 5. Scalability
//    - Easy to scale applications
//    - Orchestration with Docker Swarm/Kubernetes

// Developer: "My Node.js 16 app works!"
// Server: "We have Node.js 14... app crashes!"

// With Docker:
// Developer: "Here's the Docker container with Node.js 16"
// Server: "Running the container... app works!"

// Docker Components:
// - Docker Engine (The core)
// - Docker Image (Blueprint)
// - Docker Container (Running instance)
// - Dockerfile (Instructions to build image)
// - Docker Compose (Multi-container apps)

// Virtual Machine:
// +-------------------------------+
// |           App A               |
// |         Bins/Libs             |
// +-------------------------------+
// |        Guest OS               |
// +-------------------------------+
// |       Hypervisor              |

// +-------------------------------+

// +-------------------------------+
// |           App A               |
// |         Bins/Libs             |
// +-------------------------------+
// |        Docker Engine          |
// +-------------------------------+
// |        Host OS                |
// +-------------------------------+
// |       Infrastructure          |
// +-------------------------------+

// Comparison Table:
// | Aspect           | Virtual Machines   | Docker Containers     |
// |------------------|--------------------|-----------------------|
// | Startup Time     | Minutes            | Seconds               |
// | Size             | GBs                | MBs                   |
// | Performance      | Lower              | Near-native           |
// | Isolation        | Full OS isolation  | Process isolation     |
// | Portability      | Heavy              | Lightweight           |
// | Overhead         | High               | Low                   |

// When to use VMs:
// - Need full OS isolation
// - Running multiple different OSes
// - Legacy applications
// - Strong security boundaries needed

// When to use Docker:

// - CI/CD pipelines
// - Development environments
// - Scalable web applications

// 2. Speed

// 3. Developer Productivity
//    - Same environment everywhere
//    - Easy to share and collaborate

// 4. Version Control
//    - Docker images can be versioned
//    - Rollback to previous versions

docker ps                          # List running containers
docker ps -a                       # List all containers (including stopped)
docker run node:16                 # Run a container from image
docker start my-container          # Start a stopped container
docker stop my-container           # Stop a running container
docker restart my-container        # Restart a container
docker rm my-container             # Remove a container

docker run -e NODE_ENV=prod node:16 # Set environment variable
docker run --name myapp node:16    # Name the container

docker logs my-container           # View container logs
docker exec -it my-container bash  # Enter container shell
