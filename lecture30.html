// ===== MULTER WITH LOCAL STORAGE =====
// src/middleware/uploadMiddleware.js
const multer = require('multer');
const path = require('path');
const fs = require('fs');

// Ensure upload directory exists
const uploadDir = path.join(__dirname, '../uploads');
if (!fs.existsSync(uploadDir)) {
    fs.mkdirSync(uploadDir, { recursive: true });
}

// Configure local storage with Multer
const storage = multer.diskStorage({
    destination: (req, file, cb) => {
        // Organize files by type
        let folder = 'uploads/';
        if (file.mimetype.startsWith('image/')) {
            folder += 'images/';
        } else if (file.mimetype.startsWith('application/')) {
            folder += 'documents/';
        } else {
            folder += 'others/';
        }
        
        // Create folder if it doesn't exist
        if (!fs.existsSync(folder)) {
            fs.mkdirSync(folder, { recursive: true });
        }
        cb(null, folder);
    },
    filename: (req, file, cb) => {
        // Generate unique filename with original extension
        const uniqueSuffix = Date.now() + '-' + Math.round(Math.random() * 1E9);
        const fileExtension = path.extname(file.originalname);
        const baseName = path.basename(file.originalname, fileExtension);
        const safeFileName = baseName.replace(/[^a-zA-Z0-9]/g, '_');
        cb(null, safeFileName + '-' + uniqueSuffix + fileExtension);
    }
});

// File filter for security
const fileFilter = (req, file, cb) => {
    // Check file types
    if (file.mimetype.startsWith('image/')) {
        const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
        if (allowedTypes.includes(file.mimetype)) {
            cb(null, true);
        } else {
            cb(new Error('Only JPEG, PNG, GIF, and WebP images are allowed'), false);
        }
    } else if (file.mimetype.startsWith('application/')) {
        const allowedDocs = ['application/pdf', 'application/msword'];
        if (allowedDocs.includes(file.mimetype)) {
            cb(null, true);
        } else {
            cb(new Error('Only PDF and DOC files are allowed'), false);
        }
    } else {
        cb(new Error('Unsupported file type'), false);
    }
};

// Multer configuration for local storage
const uploadLocal = multer({
    storage: storage,
    fileFilter: fileFilter,
    limits: {
        fileSize: 5 * 1024 * 1024, // 5MB limit
        files: 5 // Maximum 5 files
    }
});

// Serve static files from uploads directory
app.use('/uploads', express.static(path.join(__dirname, 'uploads')));

// File upload controller for local storage
const uploadFileLocal = async (req, res) => {
    try {
        if (!req.file) {
            return res.status(400).json({
                success: false,
                message: 'No file uploaded'
            });
        }

        // Construct public URL
        const fileUrl = \`\${req.protocol}://\${req.get('host')}/uploads/\${req.file.path.replace('uploads/', '')}\`;

        res.status(200).json({
            success: true,
            message: 'File uploaded successfully',
            data: {
                filename: req.file.filename,
                originalname: req.file.originalname,
                size: req.file.size,
                path: req.file.path,
                url: fileUrl,
                mimetype: req.file.mimetype
            }
        });
    } catch (error) {
        res.status(500).json({
            success: false,
            message: 'File upload failed',
            error: error.message
        });
    }
};

// ===== CLOUDINARY CLOUD STORAGE =====
const { CloudinaryStorage } = require('multer-storage-cloudinary');
const cloudinary = require('cloudinary').v2;

// Configure Cloudinary (free tier available)
cloudinary.config({
    cloud_name: process.env.CLOUDINARY_CLOUD_NAME,
    api_key: process.env.CLOUDINARY_API_KEY,
    api_secret: process.env.CLOUDINARY_API_SECRET,
});

// Cloudinary storage configuration
const cloudStorage = new CloudinaryStorage({
    cloudinary: cloudinary,
    params: {
        folder: 'nodejs-app',
        format: async (req, file) => {
            if (file.mimetype.startsWith('image/')) return 'webp';
            return file.originalname.split('.').pop();
        },
        transformation: [
            { width: 800, height: 600, crop: 'limit' },
            { quality: 'auto' },
            { format: 'webp' }
        ],
        public_id: (req, file) => {
            const uniqueSuffix = Date.now() + '-' + Math.round(Math.random() * 1E9);
            return file.fieldname + '-' + uniqueSuffix;
        }
    },
});

// Multer configuration for Cloudinary
const uploadCloud = multer({
    storage: cloudStorage,
    fileFilter: fileFilter,
    limits: {
        fileSize: 5 * 1024 * 1024,
        files: 5
    }
});

// File upload controller for Cloudinary
const uploadFileCloud = async (req, res) => {
    try {
        if (!req.file) {
            return res.status(400).json({
                success: false,
                message: 'No file uploaded'
            });
        }

        res.status(200).json({
            success: true,
            message: 'File uploaded to cloud successfully',
            data: {
                filename: req.file.filename,
                originalname: req.file.originalname,
                size: req.file.size,
                url: req.file.path, // Cloudinary URL
                format: req.file.format,
                public_id: req.file.filename
            }
        });
    } catch (error) {
        res.status(500).json({
            success: false,
            message: 'Cloud file upload failed',
            error: error.message
        });
    }
};

// File deletion function for Cloudinary
const deleteCloudFile = async (publicId) => {
    try {
        const result = await cloudinary.uploader.destroy(publicId);
        return result;
    } catch (error) {
        throw new Error('Cloud file deletion failed');
    }
};

// Usage in routes - Choose one method based on your needs
router.post('/upload-local', uploadLocal.single('file'), uploadFileLocal);
router.post('/upload-cloud', uploadCloud.single('file'), uploadFileCloud);
router.delete('/cloud-files/:publicId', fileController.deleteCloudFile);

Local Storage (Multer):
✅ Pros:
   - No additional costs

   - No internet dependency for uploads
   - Easy to implement

❌ Cons:
   - Limited scalability
   - Manual backup required

Cloud Storage (Cloudinary):
✅ Pros:

   - Built-in image optimization
   - Automatic backups
   - Advanced features (transformations, etc.)

❌ Cons:

*/`
