            tabTitle: "The Problem",
            title: "Why Docker exists",
            content: `/*
THE CORE PROBLEM:

• Different runtimes on dev machines vs staging vs production
• Hard to move an app with ALL its dependencies intact
• The classic line: "It works on my machine — but not on yours"

What breaks without containers:
• Node version mismatch (18 vs 20)
• Missing system libraries
• Different OS (Windows dev, Linux server)
• Manual install steps forgotten in README

Docker's answer:
• Package the app + runtime + dependencies into a standard unit
• Run the same image anywhere Docker Engine is installed
• Analogy: shipping containers — one box shape, any ship or port
*/`
        }, {
            tabTitle: "Containers vs VMs",
            title: "Containers compared to virtual machines",
            content: `/*
CONTAINERS:
• Share the host OS kernel (no full guest OS per app)
• Lightweight — often megabytes, start in seconds
• Process-level isolation (namespaces, cgroups)
• Many containers on one machine efficiently

VIRTUAL MACHINES:
• Each VM runs a full operating system
• Heavy — gigabytes of disk/RAM per VM
• Slower boot and more ops overhead
• Stronger isolation boundary (hardware virtualization)

When to think Docker (containers):
• Ship Node APIs, workers, and databases as repeatable stacks
• Local dev matches production topology (especially with Compose)

When VMs still matter:
• You need a full OS, kernel modules, or legacy stacks
• Strict regulatory isolation requirements

Rule of thumb: VMs virtualize hardware; containers virtualize the OS layer for apps.
*/`
        }, {
            tabTitle: "Core Components",
            title: "Docker Engine, Image, Container, Dockerfile, Registry",
            content: `/*
DOCKER ENGINE:
• Daemon (dockerd) — builds images, runs containers
• CLI (docker) — talks to the daemon

IMAGE:
• Read-only template: app code, Node runtime, libs, config
• Built in layers (cache-friendly, reusable base images)
• Example base: node:18-alpine

CONTAINER:
• A running instance of an image
• Own filesystem view, network, process tree (isolated)
• Ephemeral by default — data inside dies with the container unless you use volumes

DOCKERFILE:
• Text recipe to build an image
• Instructions: FROM, WORKDIR, COPY, RUN, EXPOSE, CMD

REGISTRY:
• Store and share images (Docker Hub is the default public registry)
• docker pull / docker push

Example Dockerfile for Node:
*/
# Dockerfile
FROM node:18-alpine
WORKDIR /app
COPY package*.json ./
RUN npm ci --only=production
COPY . .
EXPOSE 3000
CMD ["node", "app.js"]`
        }, {
            tabTitle: "Volumes & Compose",
            title: "Persistent data & multi-container apps",
            content: `/*
VOLUMES:
• Data survives container restarts/removal
• Use for database files, uploads, anything that must persist
• docker volume create mydata
• docker run -v mydata:/data/db ...

DOCKER COMPOSE:
• Define multiple services in one YAML file
• One command starts app + database + networks
• Perfect for local full-stack dev and small deployments

Example docker-compose.yml (API + Mongo):
*/
# docker-compose.yml
services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/mydb
      - JWT_SECRET=dev-secret
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:`
        }, {

            title: "Build, run, and compose",

TYPICAL WORKFLOW:

1. Write Dockerfile (describe environment)
2. Build image:    docker build -t my-node-api .
3. Run container:  docker run -d -p 3000:3000 --name api my-node-api
4. Multi-service:  docker compose up -d
5. Logs:           docker logs api
6. Stop:           docker compose down

Useful commands:
• docker ps              — running containers
• docker images          — local images
• docker exec -it api sh — shell inside container
• docker compose up --build — rebuild and start stack

Port mapping -p 3000:3000 means host:container
*/`

✓ Efficiency — far lighter than VMs for microservices
✓ Fast deploy & scale out — spin more containers behind a load balancer
✓ DevOps / CI fit — build image in pipeline, push to registry, deploy anywhere
*/`
