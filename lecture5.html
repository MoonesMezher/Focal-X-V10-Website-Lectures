const person = {
    name: "Alice",
    age: 30,
    isStudent: true,

        city: "Paris",

console.log(person["name"]); // Alice

console.log(person[prop]); // 30

console.log(person.greet()); // Hello, my name is Alice

// Object Operations:

person.job = "Developer";

// Delete Property
delete person.isStudent;

// Modify Property
person.age = 31;

// Check if Property Exists
console.log("name" in person); // true

// Object Methods:
console.log(Object.keys(person)); // ["name", "age", "subjects", "address", "greet", "job"]
console.log(Object.values(person)); // ["Alice", 31, Array(2), {…}, ƒ, "Developer"]
console.log(Object.entries(person)); // Array of [key, value] pairs

// Object.assign() (merge)
const car = { brand: "Toyota" };
const updatedCar = Object.assign({}, car, { model: "Camry", year: 2023 });
console.log(updatedCar); // { brand: "Toyota", model: "Camry", year: 2023 }

// Object.freeze()
Object.freeze(car);
car.brand = "Honda"; // Fails silently in non-strict mode
console.log(car.brand); // "Toyota"

// Iterating Over Objects:
// for...in loop
for (const key in person) {
    console.log(\`\${key}: \${person[key]}\`);
}

// Object.entries() + forEach
Object.entries(person).forEach(([key, value]) => {

let i = 1;
const interval = setInterval(() => {
    console.log("Hi from inside setInterval callback function", i);
    i++;
}, 1000); // each 1000 ms == 1 s => run the callback function

// setTimeout(function, time); => time in ms
setTimeout(() => {
    console.log("Hi from inside setTimeout callback function");
}, 1000); // after 1000 ms == 1 s => run the callback function

// pause set interval
setTimeout(() => {
    clearInterval(interval);
}, 3000);

// Timer example:
let seconds = 10;
let remaining = seconds;

// Create interval
const timer = setInterval(() => {
    remaining--;
    
    const minutes = Math.floor(remaining / 60);
    const seconds = remaining % 60;
    const timeString = \`\${(minutes).toString()}:\${String(seconds)}\`;
    
    process.stdout.write(\`\\rTime remaining: \${timeString}\`);
    
    if (remaining <= 0) {
        clearInterval(timer);
        console.log("\\n\\nTimer complete! 🎉");
        process.exit();
    }
}, 1000);`

const map = new Map();

// - Add
map.set(0, "A");
map.set(1, "B");

// - Get
const item1 = map.get(0);
console.log(item1); // A

// - Length
console.log(map.size); // 2

// - Has
const isExist = map.has(1); // by key
console.log(isExist); // true

// - Delete
map.delete(0);
console.log(map); // Map(1) { 1 => "B" }

// - Get keys as array
console.log([...map.keys()]); // [1]

// - Get values as array
console.log([...map.values()]); // ["B"]

// - Get keys and values as array
console.log([...map.entries()]); // [[1, "B"]]

// - Foreach
map.forEach((val, key) => {
    console.log(key, val); // 1 "B"
});

// - Clear
map.clear();
console.log(map); // Map(0) {}

// A Set stores unique values (no duplicates)
const set = new Set();

// - Add
set.add("AA");
set.add("BB");
set.add("AA"); // Won't be added (duplicate)

// - Get (no direct get method, convert to array)
const item1InSet = [...set][0];
console.log(item1InSet); // AA

// - Length
console.log(set.size); // 2

// - Has
const isExistInSet = set.has("AA"); // by value
console.log(isExistInSet); // true

// - Delete
set.delete("AA");
console.log(set); // Set(1) { "BB" }

// - Get values as array
console.log([...set.values()]); // ["BB"]

// - Foreach
set.forEach((val) => {
    console.log(val); // BB
});

// - Clear
set.clear();
console.log(set); // Set(0) {}`

Form:
try {

            content: `// Logical Operators:

// 1. && (Logical AND): Returns the first falsy value or the last truthy value
const user = { isAdmin: true };
user.isAdmin && console.log("Access granted"); // "Access granted"

console.log(0 && "hello"); // 0 (first falsy value)
console.log(1 && "hello"); // "hello" (both truthy, returns last)

// 2. || (Logical OR): Returns the first truthy value or the last falsy value
const username = "";
console.log(username || "Guest"); // "Guest"

console.log(0 || ""); // "" (both falsy, returns last)
console.log(0 || "hello"); // "hello" (first truthy value)

// 3. ?? (Nullish Coalescing): Returns right-hand value only if left is null or undefined
const quantity = 0;
console.log(quantity ?? 5); // 0 (0 is not null/undefined)
console.log(null ?? 5); // 5

// Compare with ||:
console.log(quantity || 5); // 5 (0 is falsy)

// 4. ?. (Optional Chaining): Safely access nested properties
const user2 = { address: null };
console.log(user2?.address?.city); // undefined (no error)

// Works with functions:
const fetchData = null;
console.log(fetchData?.()); // undefined

// 5. ? : (Ternary Operator): Conditional value assignment
const isValid = true;
const message = isValid ? "Yes" : "No";
console.log(message); // "Yes"

// Comparison Table:
// | Operator | Name                | Returns                           | Example                    |  
// |----------|---------------------|-----------------------------------|----------------------------|  
// | &&       | Logical AND         | First falsy value or last truthy  | 0 && "hi" → 0              |  
// | ||       | Logical OR          | First truthy value or last falsy  | "" || "hi" → "hi"          |  
// | ??       | Nullish Coalescing  | Right-hand if left is null/undefined | 0 ?? 5 → 0             |  
// | ?.       | Optional Chaining   | undefined if path is nullish      | user?.address?.city → safe |  
// | ? :      | Ternary             | Value based on condition          | isValid ? "Yes" : "No"     |`
