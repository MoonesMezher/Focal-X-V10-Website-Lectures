    return hours * 5;

const calculateGrossSalary = (baseSalary, overtime, bonus) => {
    return baseSalary + overtime + bonus;
} 

const calculateTax = (amount, taxPercent) => {
    return taxPercent * Math.pow(10, -2) * amount;
} 

const calculateNetSalary = (gross, tax, deduction) => {
    return gross - tax - deduction;
}

    }

    }
}
